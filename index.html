<body>
    
    <div class="container">
        <h2 style="color: darkgoldenrod;"> ⚡️ Electricity Consumption Classifier</h2>
        <input type="number" id="kilowatt" placeholder="Input kilowatt per hour">
        <br>
        <button onclick="evaluateScore()"> Consumption Classification </button>
    </div>

    <script>
        function evaluateScore(){
            var electricityKilowatt = document.getElementById("kilowatt").value;

            if (electricityKilowatt === ""){
                alert("Please input your kilowatt per hour.");
                return;
            }

            electricityKilowatt=Number(electricityKilowatt);

            var letterGrade = "";

            if(electricityKilowatt <=100){
                window.alert("Lifeline Consumer: Discounted electricity rates");
            }
            else if(electricityKilowatt <=200){
                window.alert("Low Consumption: Normal residential rate");
            }
            else if(electricityKilowatt <=300){
                window.alert("Average Consumption: Typical electricity usage");
            }
            else if(electricityKilowatt <=500){
                window.alert("High Consumption: Higher electricity usage");
            }
            else if(electricityKilowatt >500){
                window.alert("Very High Consumption: Heavy electricity usage");
            }
            else{
                window.alert("Invalid input. Please enter a valid kilowatt per hour value.");
            }

            document.getElementById("status").innerHTML = passStatus;
            document.getElementById("grade").innerHTML = "Grade: " + letterGrade + " " + "<br> <br>" + gradeRemark;

        }

    </script>
